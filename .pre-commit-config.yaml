---
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check --diff --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        pass_filenames: false
