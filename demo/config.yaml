branding:
  title: "Book a Meeting"
  logo: "/static/logo.svg"
  colors:
    background: "#ffffff"
    text: "#373c44"
    muted_text: "#646b79"
    primary: "#0d6efd"
    primary_hover: "#0b5ed7"
    primary_focus: "rgba(13, 110, 253, 0.25)"
    primary_inverse: "#ffffff"
    surface: "#ffffff"
    surface_border: "#e7eaef"
    surface_section: "#fbfbfc"
    form_background: "#fbfbfc"
    form_border: "#cfd5e2"
    form_active_background: "#ffffff"
    slot_colors:
      - "#4a90d9"
      - "#5ba870"
      - "#d4833e"
    slot_backgrounds:
      - "#dbeafe"
      - "#d1fae5"
      - "#ffedd5"

availability:
  calendars:
    - url: http://radicale:5232/reader/work/
      username: reader
      password_env: CALDAV_PASSWORD

    - url: http://radicale:5232/reader/personal/
      username: reader
      password_env: CALDAV_PASSWORD
booking:
  owner_name: "Jane Doe"
  summary_template: "{customer_name} and {owner_name}"

rules:
  timezone: Europe/Vienna
  working_hours:
    mon: ["09:00-17:00"]
    tue: ["09:00-17:00"]
    wed: ["09:00-17:00"]
    thu: ["09:00-17:00"]
    fri: ["09:00-16:00"]
  slot_durations: [30m, 60m, 90m]
  buffer: 15m
  minimum_notice: 24h
  horizon: 60d

email:
  owner: jane.doe@example.com
  from_name: Zeitfenster
  smtp_host_env: SMTP_HOST
  smtp_port: 1025
  smtp_user_env: SMTP_USER
  smtp_password_env: SMTP_PASSWORD
  smtp_start_tls: false
  smtp_use_auth: false
