apiVersion: v1
kind: Pod
metadata:
  name: zeitfenster
  labels:
    app: zeitfenster
spec:
  containers:
    - name: caddy
      image: caddy:2-alpine
      ports:
        - containerPort: 80
          hostPort: 8080
      volumeMounts:
        - name: site-data
          mountPath: /site
          readOnly: true
        - name: caddyfile
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
          readOnly: true

    - name: app
      image: localhost/zeitfenster:latest
      env:
        - name: ZEITFENSTER_CONFIG_PATH
          value: /etc/zeitfenster/config.yaml
        - name: ZEITFENSTER_SITE_DIR
          value: /site
      envFrom:
        - secretRef:
            name: zeitfenster-secrets
      volumeMounts:
        - name: site-data
          mountPath: /site
        - name: config
          mountPath: /etc/zeitfenster/config.yaml
          subPath: config.yaml
          readOnly: true

  volumes:
    - name: site-data
      emptyDir: {}
    - name: caddyfile
      hostPath:
        path: ./Caddyfile
        type: File
    - name: config
      hostPath:
        path: ./demo/config.yaml
        type: File
