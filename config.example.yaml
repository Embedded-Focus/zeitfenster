branding:
  title: "Book a Meeting"
  # Use /static/custom/logo.svg for deployment-provided assets mounted via
  # ZEITFENSTER_CUSTOM_STATIC_DIR, or /static/logo.svg for the bundled example.
  # The logo is also used as the favicon, so only SVG logos are supported.
  logo: "/static/custom/logo.svg"
  colors:
    background: "#ffffff"
    text: "#373c44"
    muted_text: "#646b79"
    primary: "#2563eb"
    primary_hover: "#1d4ed8"
    primary_focus: "rgba(37, 99, 235, 0.25)"
    primary_inverse: "#ffffff"
    surface: "#ffffff"
    surface_border: "#e7eaef"
    surface_section: "#fbfbfc"
    form_background: "#fbfbfc"
    form_border: "#cfd5e2"
    form_active_background: "#ffffff"
    slot_colors:
      - "#4a90d9"
      - "#5ba870"
      - "#d4833e"
    slot_backgrounds:
      - "#dbeafe"
      - "#d1fae5"
      - "#ffedd5"

availability:
  calendars:
    - url: https://radicale.example.com/user/family/
      username: family-reader
      password_env: FAMILY_PASSWORD

    - url: https://radicale.example.com/user/work/
      username: work-reader
      password_env: WORK_PASSWORD

  # Read-only ICS URLs (e.g. Google Calendar "secret address in iCal format")
  # Google Calendar: Settings > pick calendar > "Secret address in iCal format"
  ics_urls:
    - url: https://calendar.google.com/calendar/ical/your-calendar-id%40group.calendar.google.com/private-abc123/basic.ics

  # Federation: other zeitfenster instances whose free slots are intersected
  # with this instance's slots. Only times available on ALL instances are shown.
  # token_env is optional. If set, the federation client sends it as a Bearer
  # token when fetching that member's /api/free-slots endpoint.
  # zeitfenster_urls:
  #   - url: https://alice.example.com
  #   - url: https://bob.example.com
  #     token_env: BOB_ZEITFENSTER_TOKEN

# Optional inbound authentication for this instance's /api/free-slots endpoint.
# If omitted, /api/free-slots is public and computed free slots are scrapeable.
# If set, requests must include: Authorization: Bearer <env value>
# federation:
#   free_slots_token_env: ZEITFENSTER_FREE_SLOTS_TOKEN

# Optional CAPTCHA protection for POST /book using a self-hosted Cap instance.
# Public values are embedded into the generated booking page. The secret remains
# in the internal Python backend and is only read from the named environment var.
# Also allow the Cap origin in Caddy's CSP, for example:
# ZEITFENSTER_CAP_SCRIPT_SRC=https://cap.example.com
# ZEITFENSTER_CAP_WASM_EVAL_SRC='wasm-unsafe-eval'
# ZEITFENSTER_CAP_CONNECT_SRC=https://cap.example.com
# ZEITFENSTER_CAP_WORKER_SRC=https://cap.example.com
# captcha:
#   enabled: true
#   provider: cap
#   api_endpoint: https://cap.example.com/site-key/
#   widget_script_url: https://cap.example.com/assets/widget.js
#   wasm_url: https://cap.example.com/assets/cap_wasm_bg.wasm
#   secret_env: CAP_SECRET

booking:
  # Optional location for the owner-side draft event. This can be a permanent
  # meeting room URL, a physical location, or omitted for manual editing.
  location: https://meet.example.com/my-room
  # Optional display name for the owner in generated calendar content.
  owner_name: "Jane Doe"
  # Subject/title for the generated owner-side .ics event.
  # Available placeholders: {customer_name}, {customer_email}, {owner_name}, {owner_email}
  summary_template: "{customer_name} and {owner_name}"
  # Body text for the generated owner-side .ics event.
  # Available placeholders: {customer_name}, {customer_email}
  description_template: ""

rules:
  timezone: Europe/Vienna
  working_hours:
    mon: ["09:00-17:00"]
    tue: ["09:00-17:00"]
    wed: ["09:00-17:00"]
    thu: ["09:00-17:00"]
    fri: ["09:00-16:00"]
  slot_durations: [30m, 60m, 90m]
  buffer: 15m
  minimum_notice: 24h
  horizon: 60d
  # How often calendars and federation members are refreshed.
  refresh_interval: 15m

email:
  # Single owner or list for federation:
  # owner: you@example.com
  owner:
    - alice@example.com
    - bob@example.com
  from_name: Zeitfenster
  smtp_host_env: SMTP_HOST
  smtp_port: 587
  smtp_user_env: SMTP_USER
  smtp_password_env: SMTP_PASSWORD
  smtp_start_tls: true
  # true requires smtp_start_tls or smtp_use_tls to be enabled — sending
  # credentials over an unencrypted connection is not allowed. Set to
  # false only for trusted relays that genuinely accept unauthenticated
  # mail (e.g. a trusted local relay).
  smtp_use_auth: true
  # Implicit TLS (SMTPS, typically port 465), mutually exclusive with
  # smtp_start_tls. To use SMTPS: set smtp_start_tls: false,
  # smtp_use_tls: true, and smtp_port: 465.
  smtp_use_tls: false
