branding:
  title: "Book a Meeting"
  logo: "/static/logo.png"
  colors:
    primary: "#2563eb"
    background: "#ffffff"

availability:
  calendars:
    - url: https://radicale.example.com/user/family/
      username: family-reader
      password_env: FAMILY_PASSWORD

    - url: https://radicale.example.com/user/work/
      username: work-reader
      password_env: WORK_PASSWORD

  # Read-only ICS URLs (e.g. Google Calendar "secret address in iCal format")
  # Google Calendar: Settings > pick calendar > "Secret address in iCal format"
  ics_urls:
    - url: https://calendar.google.com/calendar/ical/your-calendar-id%40group.calendar.google.com/private-abc123/basic.ics

  # Federation: other zeitfenster instances whose free slots are intersected
  # with this instance's slots. Only times available on ALL instances are shown.
  # zeitfenster_urls:
  #   - url: https://alice.example.com
  #   - url: https://bob.example.com

rules:
  timezone: Europe/Vienna
  working_hours:
    mon: ["09:00-17:00"]
    tue: ["09:00-17:00"]
    wed: ["09:00-17:00"]
    thu: ["09:00-17:00"]
    fri: ["09:00-16:00"]
  slot_durations: [30m, 60m, 90m]
  buffer: 15m
  minimum_notice: 24h
  horizon: 60d

email:
  # Single owner or list for federation:
  # owner: you@example.com
  owner:
    - alice@example.com
    - bob@example.com
  smtp_host_env: SMTP_HOST
  smtp_port: 587
  smtp_user_env: SMTP_USER
  smtp_password_env: SMTP_PASSWORD
  smtp_start_tls: true
